spring.application.name=nameprocessing

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.url = jdbc:${DATABASE_URL}
spring.flyway.user = ${DB_USERNAME}
spring.flyway.password = ${DB_PASSWORD}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.schemas=api
spring.flyway.default-schema=api

#server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=None


server.forward-headers-strategy=framework

spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}

# HikariCP settings
spring.datasource.hikari.maximum-pool-size=9
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1700000
spring.datasource.hikari.pool-name=MyHi

